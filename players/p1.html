<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha RPG</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body data-player="p1">

<div class="sheet">

  <!-- HEADER -->
  <div class="header">
    <h1 id="char-nome">Agente</h1>
    <p id="char-info">Classe • Origem</p>
    <div id="save-status">✔ Sincronizado</div>
  </div>

  <div class="top">

    <!-- INFO -->
    <div class="info">
      <div class="fields-group">
        <div class="field"><label>Nome</label><input id="nome"></div>
        <div class="field"><label>Classe</label><input id="classe"></div>
        <div class="field"><label>Origem</label><input id="origem"></div>
        <div class="field"><label>Idade</label><input id="idade"></div>
        <div class="field"><label>Altura</label><input id="altura"></div>
        <div class="field"><label>Peso</label><input id="peso"></div>
        <div class="field"><label>Dinheiro</label><input id="dinheiro"></div>
      </div>
    </div>

    <!-- ATRIBUTOS -->
    <div class="info">
      <h2>ATRIBUTOS</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="forca">Força</label><input id="forca" type="number"></div>
        <div class="field"><label class="roll-label" data-input="agilidade">Agilidade</label><input id="agilidade" type="number"></div>
        <div class="field"><label class="roll-label" data-input="intelecto">Intelecto</label><input id="intelecto" type="number"></div>
        <div class="field"><label class="roll-label" data-input="presenca">Presença</label><input id="presenca" type="number"></div>
        <div class="field"><label class="roll-label" data-input="vigor">Vigor</label><input id="vigor" type="number"></div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="info">
      <h2>STATUS</h2>

      <label>❤️ VIDA</label>
      <input id="vida-atual" type="number"> /
      <input id="vida-max" type="number">
      <div class="bar"><div id="vida"></div></div>

      <label>🧠 SANIDADE</label>
      <input id="sanidade-atual" type="number"> /
      <input id="sanidade-max" type="number">
      <div class="bar"><div id="sanidade"></div></div>

      <label>⚡ ENERGIA</label>
      <input id="energia-atual" type="number"> /
      <input id="energia-max" type="number">
      <div class="bar"><div id="energia"></div></div>

      <div class="field"><label>Defesa</label><input id="defesa"></div>
      <div class="field"><label>Iniciativa</label><input id="iniciativa"></div>
      <div class="field"><label>Deslocamento</label><input id="deslocamento"></div>
    </div>

  </div>

  <div class="middle">

    <!-- COMBATE -->
    <div class="block">
      <h2>COMBATE</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="luta">Luta</label><input id="luta"></div>
        <div class="field"><label class="roll-label" data-input="pontaria">Pontaria</label><input id="pontaria"></div>
        <div class="field"><label class="roll-label" data-input="tatica">Tática</label><input id="tatica"></div>
      </div>
    </div>

    <!-- PERÍCIAS -->
    <div class="block">
      <h2>PERÍCIAS</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="investigacao">Investigação</label><input id="investigacao"></div>
        <div class="field"><label class="roll-label" data-input="percepcao">Percepção</label><input id="percepcao"></div>
        <div class="field"><label class="roll-label" data-input="furtividade">Furtividade</label><input id="furtividade"></div>
        <div class="field"><label class="roll-label" data-input="atletismo">Atletismo</label><input id="atletismo"></div>
        <div class="field"><label class="roll-label" data-input="tecnologia">Tecnologia</label><input id="tecnologia"></div>
        <div class="field"><label class="roll-label" data-input="medicina">Medicina</label><input id="medicina"></div>
        <div class="field"><label class="roll-label" data-input="intimidacao">Intimidação</label><input id="intimidacao"></div>
        <div class="field"><label class="roll-label" data-input="persuasao">Persuasão</label><input id="persuasao"></div>
      </div>
    </div>

    <!-- ARMADURA -->
    <div class="block">
      <h2>ARMADURA</h2>
      <div class="fields-group">
        <div class="field"><label>Nome</label><input id="armadura-nome"></div>
        <div class="field"><label>Proteção</label><input id="armadura-def"></div>
        <div class="field"><label>Penalidade</label><input id="armadura-pen"></div>
        <div class="field"><label>Durabilidade</label><input id="armadura-dur"></div>
      </div>
    </div>

    <!-- ARMAS DETALHADAS -->
    <div class="block">
      <h2>ARMAS</h2>
      <div class="fields-group">
        <div class="field"><label>Arma</label><input id="arma1"></div>
        <div class="field"><label>Dano</label><input id="arma1-dano"></div>
        <div class="field"><label>Crítico</label><input id="arma1-crit"></div>
        <div class="field"><label>Munição</label><input id="arma1-muni"></div>
      </div>
    </div>

    <!-- INVENTÁRIO -->
    <div class="block">
      <h2>INVENTÁRIO</h2>
      <textarea id="inventario"></textarea>
    </div>

    <!-- HABILIDADES -->
    <div class="block">
      <h2>HABILIDADES</h2>
      <textarea id="habilidades"></textarea>
    </div>

    <!-- CONDIÇÕES -->
    <div class="block">
      <h2>CONDIÇÕES</h2>
      <textarea id="condicoes"></textarea>
    </div>

    <!-- BUFFS -->
    <div class="block">
      <h2>BUFFS / DEBUFFS</h2>
      <textarea id="buffs"></textarea>
    </div>

    <!-- ANOTAÇÕES -->
    <div class="block">
      <h2>ANOTAÇÕES</h2>
      <textarea id="anotacoes"></textarea>
    </div>

  </div>

</div>

<script>
  localStorage.setItem("playerId", "p1");
</script>

<div id="dice-overlay">
  <div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
    <div id="dice-sprite"></div>
    <div id="dice-text" class="dice-text"></div>
  </div>
</div>

<a href="../arvore1.html" class="skill-btn">⛧ Habilidades ⛧</a>

<script type="module" src="../main.js"></script>
</body>
</html>
