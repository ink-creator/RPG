<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha RPG</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body data-player="p1">

<div class="sheet">

  <!-- TOPO -->
  <div class="top">

    <!-- INFO -->
    <div class="info left">
      <div class="fields-group">
        <div class="field"><label>Nome</label><input id="nome"></div>
        <div class="field"><label>Raça</label><input id="raca"></div>
        <div class="field"><label>Semi-Raça</label><input id="sraca"></div>
        <div class="field"><label>Classe</label><input id="classe"></div>
        <div class="field"><label>Origem</label><input id="origem"></div>
        <div class="field"><label>Idade</label><input id="idade"></div>
        <div class="field"><label>Altura</label><input id="altura"></div>
        <div class="field"><label>Peso</label><input id="peso"></div>
        <div class="field"><label>Dinheiro</label><input id="dinheiro"></div>
      </div>
    </div>

    <!-- ATRIBUTOS -->
    <div class="info center">
      <h2>ATRIBUTOS</h2>
      <div class="fields-group">
        <div class="field"><label>Força</label><input id="forca" type="number"></div>
        <div class="field"><label>Agilidade</label><input id="agilidade" type="number"></div>
        <div class="field"><label>Intelecto</label><input id="intelecto" type="number"></div>
        <div class="field"><label>Presença</label><input id="presenca" type="number"></div>
        <div class="field"><label>Vigor</label><input id="vigor" type="number"></div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="info right">
      <div class="status-container">

        <!-- VIDA -->
        <div class="bar-group">
          <label>VIDA</label>
          <div class="bar-inputs">
            <input id="vida-atual" type="number"> /
            <input id="vida-max" type="number">
          </div>
          <div class="bar"><div id="vida"></div></div>
          <input id="vida-resistencia" placeholder="Resistência">
        </div>

        <!-- SANIDADE -->
        <div class="bar-group">
          <label>SANIDADE</label>
          <div class="bar-inputs">
            <input id="sanidade-atual" type="number"> /
            <input id="sanidade-max" type="number">
          </div>
          <div class="bar"><div id="sanidade"></div></div>
          <input id="sanidade-resistencia" placeholder="Resistência">
        </div>

        <!-- ENERGIA -->
        <div class="bar-group">
          <label>ENERGIA</label>
          <div class="bar-inputs">
            <input id="energia-atual" type="number"> /
            <input id="energia-max" type="number">
          </div>
          <div class="bar"><div id="energia"></div></div>
          <input id="energia-resistencia" placeholder="Resistência">
        </div>

      </div>
    </div>

  </div>

  <!-- MEIO -->
  <div class="middle">

    <!-- PERÍCIAS GERAIS -->
    <div class="block">
      <h2>PERÍCIAS GERAIS</h2>
      <div class="fields-group">
        <input id="luta" placeholder="Luta">
        <input id="destreza" placeholder="Destreza">
        <input id="furtividade" placeholder="Furtividade">
        <input id="vigilancia" placeholder="Vigilância">
        <input id="sorte" placeholder="Sorte">
      </div>
    </div>

    <!-- INTERPESSOAL -->
    <div class="block">
      <h2>INTERPESSOAL</h2>
      <div class="fields-group">
        <input id="charme" placeholder="Charme">
        <input id="intimidar" placeholder="Intimidar">
        <input id="manipulacao" placeholder="Manipulação">
        <input id="negociar" placeholder="Negociar">
        <input id="psicologia" placeholder="Psicologia">
      </div>
    </div>

    <!-- TÉCNICO -->
    <div class="block">
      <h2>TÉCNICO</h2>
      <div class="fields-group">
        <input id="tecnologia" placeholder="Tecnologia">
        <input id="mecanica" placeholder="Mecânica">
        <input id="balistica" placeholder="Balística">
        <input id="investigacao" placeholder="Investigação">
        <input id="medicina" placeholder="Medicina">
      </div>
    </div>

    <!-- ACADÊMICO -->
    <div class="block">
      <h2>ACADÊMICO</h2>
      <div class="fields-group">
        <input id="historia" placeholder="História">
        <input id="geografia" placeholder="Geografia">
        <input id="fisica" placeholder="Física">
        <input id="quimica" placeholder="Química">
        <input id="linguagem" placeholder="Linguagem">
      </div>
    </div>

    <!-- PODERES -->
    <div class="block">
      <h2>PODERES</h2>
      <textarea id="poderes" rows="5"></textarea>
    </div>

    <!-- SANIDADE EXTRA -->
    <div class="block">
      <h2>MENTAL</h2>
      <input id="exposicao" placeholder="Exposição Paranormal">
      <textarea id="traumas" placeholder="Traumas" rows="3"></textarea>
    </div>

    <!-- INVENTÁRIO -->
    <div class="block">
      <h2>INVENTÁRIO</h2>
      <textarea id="inventario" rows="6"></textarea>
    </div>

  </div>

</div>

<script>
  localStorage.setItem("playerId", "p1");

  // AUTO SAVE
  const inputs = document.querySelectorAll("input, textarea");

  inputs.forEach(input => {
    input.addEventListener("input", () => {
      localStorage.setItem(input.id, input.value);
    });

    const saved = localStorage.getItem(input.id);
    if (saved) input.value = saved;
  });
</script>

<script type="module" src="../main.js"></script>

</body>
</html>
