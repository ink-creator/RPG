<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ficha RPG</title>
  <link rel="stylesheet" href="style.css">
</head>
<body data-player="p1">

<div class="sheet">

  <!-- TOPO -->
  <div class="top">

    <!-- INFO -->
    <div class="info">
      <div class="fields-group">
        <div class="field"><label>Nome</label><input id="nome"></div>
        <div class="field"><label>Raça</label><input id="raca"></div>
        <div class="field"><label>Classe</label><input id="classe"></div>
        <div class="field"><label>Origem</label><input id="origem"></div>
        <div class="field"><label>Idade</label><input id="idade"></div>
        <div class="field"><label>Dinheiro</label><input id="dinheiro"></div>
      </div>
    </div>

    <!-- ATRIBUTOS -->
    <div class="info">
      <h2>ATRIBUTOS</h2>
      <div class="fields-group">

        <div class="field">
          <label class="roll-label" data-input="forca">Força</label>
          <input id="forca" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="agilidade">Agilidade</label>
          <input id="agilidade" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="intelecto">Intelecto</label>
          <input id="intelecto" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="presenca">Presença</label>
          <input id="presenca" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="vigor">Vigor</label>
          <input id="vigor" type="number">
        </div>

      </div>
    </div>

    <!-- STATUS -->
    <div class="info">
      <h2>STATUS</h2>

      <label>VIDA</label>
      <input id="vida-atual" type="number"> /
      <input id="vida-max" type="number">
      <div class="bar"><div id="vida"></div></div>

      <label>SANIDADE</label>
      <input id="sanidade-atual" type="number"> /
      <input id="sanidade-max" type="number">
      <div class="bar"><div id="sanidade"></div></div>

      <label>ENERGIA</label>
      <input id="energia-atual" type="number"> /
      <input id="energia-max" type="number">
      <div class="bar"><div id="energia"></div></div>

    </div>

  </div>

  <!-- MEIO -->
  <div class="middle">

    <!-- PERÍCIAS -->
    <div class="block">
      <h2>PERÍCIAS</h2>
      <div class="fields-group">

        <div class="field">
          <label class="roll-label" data-input="luta">Luta</label>
          <input id="luta" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="furtividade">Furtividade</label>
          <input id="furtividade" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="vigilancia">Vigilância</label>
          <input id="vigilancia" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="sorte">Sorte</label>
          <input id="sorte" type="number">
        </div>

      </div>
    </div>

    <!-- SOCIAL -->
    <div class="block">
      <h2>INTERPESSOAL</h2>
      <div class="fields-group">

        <div class="field">
          <label class="roll-label" data-input="charme">Charme</label>
          <input id="charme" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="intimidar">Intimidar</label>
          <input id="intimidar" type="number">
        </div>

        <div class="field">
          <label class="roll-label" data-input="negociar">Negociar</label>
          <input id="negociar" type="number">
        </div>

      </div>
    </div>

    <!-- PODERES -->
    <div class="block">
      <h2>PODERES</h2>
      <textarea id="poderes" rows="5"></textarea>
    </div>

    <!-- INVENTÁRIO -->
    <div class="block">
      <h2>INVENTÁRIO</h2>
      <textarea id="inventario" rows="6"></textarea>
    </div>

  </div>

</div>
<script>
  localStorage.setItem("playerId", "p2");
</script>

<div id="dice-overlay">
  <div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
    <div id="dice-sprite"></div>
    <div id="dice-text" class="dice-text"></div>
  </div>
</div>


<a href="../arvore2.html"
   style="
     display:inline-block;
     margin-top:12px;
     padding:6px 14px;
     font-family:'Times New Roman', serif;
     font-size:16px;
     letter-spacing:1px;
     color:#ff1a1a;
     text-decoration:none;
     border:1px solid #ff1a1a;
     background:linear-gradient(180deg,#1a1a1a,#050505);
     box-shadow: inset 0 0 6px rgba(255,0,0,0.4), 0 0 10px rgba(255,0,0,0.2);
     transition:all 0.25s ease;
   "
   onmouseover="
     this.style.color='#ffffff';
     this.style.boxShadow='inset 0 0 10px rgba(255,0,0,0.8), 0 0 18px rgba(255,0,0,0.6)';
   "
   onmouseout="
     this.style.color='#ff1a1a';
     this.style.boxShadow='inset 0 0 6px rgba(255,0,0,0.4), 0 0 10px rgba(255,0,0,0.2)';
   ">

</a>

<script type="module" src="../main.js"></script>
</body>
</html>
