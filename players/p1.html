<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha</title>
  <link rel="stylesheet" href="../style.css">
</head>
<body>

<div class="sheet">

  <div class="top">

    <div class="info">
      <div class="fields-group">
        <div class="field"><label>Nome</label><input id="nome"></div>
        <div class="field"><label>Classe</label><input id="classe"></div>
        <div class="field"><label>Origem</label><input id="origem"></div>
        <div class="field"><label>Idade</label><input id="idade"></div>
        <div class="field"><label>Altura</label><input id="altura"></div>
        <div class="field"><label>Peso</label><input id="peso"></div>
        <div class="field"><label>Dinheiro</label><input id="dinheiro"></div>
      </div>
    </div>

    <!-- ATRIBUTOS -->
    <div class="info">
      <h2>ATRIBUTOS</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="forca">Força</label><input id="forca" type="number"></div>
        <div class="field"><label class="roll-label" data-input="agilidade">Agilidade</label><input id="agilidade" type="number"></div>
        <div class="field"><label class="roll-label" data-input="intelecto">Intelecto</label><input id="intelecto" type="number"></div>
        <div class="field"><label class="roll-label" data-input="presenca">Presença</label><input id="presenca" type="number"></div>
        <div class="field"><label class="roll-label" data-input="vigor">Vigor</label><input id="vigor" type="number"></div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="info">
      <h2>STATUS</h2>

      <label>VIDA</label>
      <input id="vida-atual" type="number"> /
      <input id="vida-max" type="number">
      <div class="bar"><div id="vida"></div></div>

      <label>SANIDADE</label>
      <input id="sanidade-atual" type="number"> /
      <input id="sanidade-max" type="number">
      <div class="bar"><div id="sanidade"></div></div>

      <label>ENERGIA</label>
      <input id="energia-atual" type="number"> /
      <input id="energia-max" type="number">
      <div class="bar"><div id="energia"></div></div>

    </div>

  </div>

  <div class="middle">

    <!-- COMBATE -->
    <div class="block">
      <h2>COMBATE</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="luta">Luta</label><input id="luta"></div>
        <div class="field"><label class="roll-label" data-input="armas-brancas">Armas Brancas</label><input id="armas-brancas"></div>
        <div class="field"><label class="roll-label" data-input="armas-de-fogo">Armas de Fogo</label><input id="armas-de-fogo"></div>
        <div class="field"><label class="roll-label" data-input="armas-pesadas">Armas Pesadas</label><input id="armas-pesadas"></div>
        <div class="field"><label class="roll-label" data-input="tatica">Tática</label><input id="tatica"></div>
        <div class="field"><label class="roll-label" data-input="combate-improvisado">Combate Improvisado</label><input id="combate-improvisado"></div>
      </div>
    </div>

    <!-- FÍSICO -->
    <div class="block">
      <h2>FÍSICO</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="corrida">Corrida</label><input id="corrida"></div>
        <div class="field"><label class="roll-label" data-input="escalada">Escalada</label><input id="escalada"></div>
        <div class="field"><label class="roll-label" data-input="natacao">Natação</label><input id="natacao"></div>
        <div class="field"><label class="roll-label" data-input="equilibrio">Equilíbrio</label><input id="equilibrio"></div>
        <div class="field"><label class="roll-label" data-input="resistencia-fisica">Resistência Física</label><input id="resistencia-fisica"></div>
      </div>
    </div>

    <!-- MENTAL -->
    <div class="block">
      <h2>MENTAL</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="concentracao">Concentração</label><input id="concentracao"></div>
        <div class="field"><label class="roll-label" data-input="memoria">Memória</label><input id="memoria"></div>
        <div class="field"><label class="roll-label" data-input="logica">Lógica</label><input id="logica"></div>
        <div class="field"><label class="roll-label" data-input="raciocinio">Raciocínio</label><input id="raciocinio"></div>
      </div>
    </div>

    <!-- INVESTIGAÇÃO -->
    <div class="block">
      <h2>INVESTIGAÇÃO</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="observacao">Observação</label><input id="observacao"></div>
        <div class="field"><label class="roll-label" data-input="detectar-mentiras">Detectar Mentiras</label><input id="detectar-mentiras"></div>
        <div class="field"><label class="roll-label" data-input="rastreamento">Rastreamento</label><input id="rastreamento"></div>
        <div class="field"><label class="roll-label" data-input="analise">Análise</label><input id="analise"></div>
      </div>
    </div>

    <!-- SOCIAL -->
    <div class="block">
      <h2>SOCIAL</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="lideranca">Liderança</label><input id="lideranca"></div>
        <div class="field"><label class="roll-label" data-input="persuasao">Persuasão</label><input id="persuasao"></div>
        <div class="field"><label class="roll-label" data-input="intimidar">Intimidar</label><input id="intimidar"></div>
        <div class="field"><label class="roll-label" data-input="empatia">Empatia</label><input id="empatia"></div>
        <div class="field"><label class="roll-label" data-input="atuacao">Atuação</label><input id="atuacao"></div>
        <div class="field"><label class="roll-label" data-input="disfarce">Disfarce</label><input id="disfarce"></div>
        <div class="field"><label class="roll-label" data-input="interrogatorio">Interrogatório</label><input id="interrogatorio"></div>
      </div>
    </div>

    <!-- TÉCNICO -->
    <div class="block">
      <h2>TÉCNICO</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="tecnologia">Tecnologia</label><input id="tecnologia"></div>
        <div class="field"><label class="roll-label" data-input="mecanica">Mecânica</label><input id="mecanica"></div>
        <div class="field"><label class="roll-label" data-input="engenharia">Engenharia</label><input id="engenharia"></div>
        <div class="field"><label class="roll-label" data-input="hackear">Hackear</label><input id="hackear"></div>
      </div>
    </div>

    <!-- VEÍCULOS -->
    <div class="block">
      <h2>VEÍCULOS</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="dirigir">Dirigir</label><input id="dirigir"></div>
        <div class="field"><label class="roll-label" data-input="pilotar">Pilotar</label><input id="pilotar"></div>
      </div>
    </div>

    <!-- PARANORMAL -->
    <div class="block">
      <h2>PARANORMAL</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="ocultismo">Ocultismo</label><input id="ocultismo"></div>
        <div class="field"><label class="roll-label" data-input="rituais">Rituais</label><input id="rituais"></div>
        <div class="field"><label class="roll-label" data-input="sensibilidade">Sensibilidade</label><input id="sensibilidade"></div>
      </div>
    </div>

    <!-- TEXTOS -->
    <div class="block"><h2>EQUIPAMENTOS</h2><textarea id="equipamentos"></textarea></div>
    <div class="block"><h2>ARMAS</h2><textarea id="armas"></textarea></div>
    <div class="block"><h2>ANOTAÇÕES</h2><textarea id="anotacoes"></textarea></div>

  </div>

</div>

<a href="../arvore2.html"
   style="
     display:inline-block;
     margin-top:12px;
     padding:6px 14px;
     font-family:'Times New Roman', serif;
     font-size:16px;
     letter-spacing:1px;
     color:#ff1a1a;
     text-decoration:none;
     border:1px solid #ff1a1a;
     background:linear-gradient(180deg,#1a1a1a,#050505);
     box-shadow: inset 0 0 6px rgba(255,0,0,0.4), 0 0 10px rgba(255,0,0,0.2);
     transition:all 0.25s ease;
   "
   onmouseover="
     this.style.color='#ffffff';
     this.style.boxShadow='inset 0 0 10px rgba(255,0,0,0.8), 0 0 18px rgba(255,0,0,0.6)';
   "
   onmouseout="
     this.style.color='#ff1a1a';
     this.style.boxShadow='inset 0 0 6px rgba(255,0,0,0.4), 0 0 10px rgba(255,0,0,0.2)';
   ">
⛧ Skill Tree ⛧
</a>

<script type="module" src="../main.js"></script>
</body>
</html>
