<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha RPG</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body data-player="p1">

<div class="sheet">

  <!-- HEADER -->
  <div class="header">
    <h1 id="char-nome">Agente</h1>
    <p id="char-info">Classe • Origem</p>
    <div id="save-status">✔ Sincronizado</div>
  </div>

  <div class="top">

    <!-- INFO -->
    <div class="info">
      <div class="fields-group">
        <div class="field"><label>Nome</label><input id="nome"></div>
        <div class="field"><label>Classe</label><input id="classe"></div>
        <div class="field"><label>Origem</label><input id="origem"></div>
        <div class="field"><label>Idade</label><input id="idade" type="number" min="0"></div>
        <div class="field"><label>Altura</label><input id="altura"></div>
        <div class="field"><label>Peso</label><input id="peso"></div>
        <div class="field"><label>Dinheiro</label><input id="dinheiro" type="number" min="0"></div>
        <div class="field"><label>Tamanho</label><input id="tamanho" placeholder="Pequeno / Médio / Grande"></div>
      </div>
    </div>

    <!-- ATRIBUTOS -->
    <div class="info">
      <h2>ATRIBUTOS</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="forca">Força</label><input id="forca" type="number" min="0"></div>
        <div class="field"><label class="roll-label" data-input="agilidade">Agilidade</label><input id="agilidade" type="number" min="0"></div>
        <div class="field"><label class="roll-label" data-input="intelecto">Intelecto</label><input id="intelecto" type="number" min="0"></div>
        <div class="field"><label class="roll-label" data-input="presenca">Presença</label><input id="presenca" type="number" min="0"></div>
        <div class="field"><label class="roll-label" data-input="vigor">Vigor</label><input id="vigor" type="number" min="0"></div>
      </div>
    </div>

    <!-- STATUS -->
    <div class="info">
      <h2>STATUS</h2>

      <label>VIDA</label>
      <input id="vida-atual" type="number" min="0"> /
      <input id="vida-max" type="number" min="0">
      <div class="bar"><div id="vida"></div></div>

      <label>SANIDADE</label>
      <input id="sanidade-atual" type="number" min="0"> /
      <input id="sanidade-max" type="number" min="0">
      <div class="bar"><div id="sanidade"></div></div>

      <label>ENERGIA</label>
      <input id="energia-atual" type="number" min="0"> /
      <input id="energia-max" type="number" min="0">
      <div class="bar"><div id="energia"></div></div>

      <div class="field"><label>Defesa</label><input id="defesa" type="number" min="0"></div>
      <div class="field"><label>Iniciativa</label><input id="iniciativa" type="number"></div>
      <div class="field"><label>Deslocamento</label><input id="deslocamento"></div>
    </div>

  </div>

  <div class="middle">

    <!-- COMBATE -->
    <div class="block">
      <h2>COMBATE</h2>
      <div class="fields-group">
        <div class="field"><label class="roll-label" data-input="luta">Luta (Força)</label><input id="luta" type="number"></div>
        <div class="field"><label class="roll-label" data-input="pontaria">Pontaria (Agilidade)</label><input id="pontaria" type="number"></div>
        <div class="field"><label class="roll-label" data-input="tatica">Tática (Intelecto)</label><input id="tatica" type="number"></div>
        <div class="field"><label>Dano Corpo a Corpo</label><input id="dano-corpo"></div>
      </div>
    </div>

    <!-- PERÍCIAS -->
    <div class="block">
      <h2>PERÍCIAS</h2>
      <div class="fields-group">

        <div class="field"><label class="roll-label" data-input="investigacao">Investigação (Intelecto)</label><input id="investigacao" type="number"></div>
        <div class="field"><label class="roll-label" data-input="percepcao">Percepção (Vigor)</label><input id="percepcao" type="number"></div>
        <div class="field"><label class="roll-label" data-input="furtividade">Furtividade (Agilidade)</label><input id="furtividade" type="number"></div>
        <div class="field"><label class="roll-label" data-input="atletismo">Atletismo (Força)</label><input id="atletismo" type="number"></div>
        <div class="field"><label class="roll-label" data-input="tecnologia">Tecnologia (Intelecto)</label><input id="tecnologia" type="number"></div>
        <div class="field"><label class="roll-label" data-input="medicina">Medicina (Intelecto)</label><input id="medicina" type="number"></div>
        <div class="field"><label class="roll-label" data-input="intimidacao">Intimidação (Presença)</label><input id="intimidacao" type="number"></div>
        <div class="field"><label class="roll-label" data-input="persuasao">Persuasão (Presença)</label><input id="persuasao" type="number"></div>

      </div>
    </div>

    <!-- ARMADURA -->
    <div class="block">
      <h2>ARMADURA & EQUIPADO</h2>
      <div class="fields-group">
        <div class="field"><label>Armadura</label><input id="armadura-nome"></div>
        <div class="field"><label>Proteção</label><input id="armadura-def"></div>
        <div class="field"><label>Penalidade</label><input id="armadura-pen"></div>
        <div class="field"><label>Durabilidade</label><input id="armadura-dur"></div>

        <hr>

        <div class="field"><label>Cabeça</label><input id="slot-cabeca"></div>
        <div class="field"><label>Peito</label><input id="slot-peito"></div>
        <div class="field"><label>Mãos</label><input id="slot-maos"></div>
        <div class="field"><label>Acessório</label><input id="slot-acessorio"></div>

        <hr>

        <textarea id="armadura-notas"></textarea>
      </div>
    </div>

    <!-- ARMAS -->
    <div class="block">
      <h2>ARMAS</h2>
      <div class="fields-group">
        <div class="field"><label>Arma 1</label><input id="arma1"></div>
        <div class="field"><label>Dano</label><input id="arma1-dano"></div>
        <div class="field"><label>Crítico</label><input id="arma1-crit"></div>
        <div class="field"><label>Munição</label><input id="arma1-mun"></div>

        <hr>

        <div class="field"><label>Arma 2</label><input id="arma2"></div>
        <div class="field"><label>Dano</label><input id="arma2-dano"></div>
        <div class="field"><label>Crítico</label><input id="arma2-crit"></div>
        <div class="field"><label>Munição</label><input id="arma2-mun"></div>

        <hr>

        <textarea id="armas-notas"></textarea>
      </div>
    </div>

    <!-- MOCHILA -->
    <div class="block">
      <h2>MOCHILA</h2>
      <div class="fields-group">
        <div class="field"><label>Peso Atual</label><input id="peso-atual" type="number"></div>
        <div class="field"><label>Capacidade</label><input id="peso-max" type="number"></div>
      </div>
    </div>

    <!-- TEXTOS -->
    <div class="block"><h2>INVENTÁRIO</h2><textarea id="inventario"></textarea></div>
    <div class="block"><h2>HABILIDADES</h2><textarea id="habilidades"></textarea></div>
    <div class="block"><h2>MISSÃO</h2><textarea id="missao"></textarea></div>
    <div class="block"><h2>CONTATOS</h2><textarea id="contatos"></textarea></div>
    <div class="block"><h2>BUFFS / DEBUFFS</h2><textarea id="buffs"></textarea></div>
    <div class="block"><h2>ANOTAÇÕES</h2><textarea id="anotacoes"></textarea></div>

  </div>

</div>

<script>
  localStorage.setItem("playerId", "p1");
</script>

<div id="dice-overlay">
  <div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
    <div id="dice-sprite"></div>
    <div id="dice-text" class="dice-text"></div>
  </div>
</div>

<a href="../arvore1.html" class="skill-btn">⛧ Habilidades ⛧</a>

<!-- ⚠️ IMPORTANTE -->
<script type="module" src="../ink.js"></script>

</body>
</html>
