<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Ficha Tática</title>
  <link rel="stylesheet" href="../style.css">
</head>

<body data-player="p5">

<div class="app">

  <!-- ================= HEADER ================= -->
  <header class="hud">
    <div class="hud-left">
      <h1 id="char-nome">AGENTE</h1>
      <span id="char-info">Classe • Origem</span>
    </div>

    <div class="hud-right">
      <span id="save-status">✔ Sincronizado</span>
    </div>
  </header>

  <!-- ================= GRID ================= -->
  <main class="grid">

    <!-- ===== ESQUERDA ===== -->
    <section class="col">

      <!-- IDENTIFICAÇÃO -->
      <div class="panel">
        <h2>IDENTIFICAÇÃO</h2>
        <div class="grid-2">

          <div class="field"><label>Nome</label><input id="nome"></div>
          <div class="field"><label>Classe</label><input id="classe"></div>
          <div class="field"><label>Origem</label><input id="origem"></div>
          <div class="field"><label>Idade</label><input id="idade" type="number"></div>
          <div class="field"><label>Altura</label><input id="altura"></div>
          <div class="field"><label>Peso</label><input id="peso"></div>
          <div class="field"><label>Dinheiro</label><input id="dinheiro" type="number"></div>
          <div class="field"><label>Tamanho</label><input id="tamanho"></div>

        </div>
      </div>

      <!-- ATRIBUTOS -->
      <div class="panel">
        <h2>ATRIBUTOS</h2>
        <div class="grid-2">

          <div class="field"><label class="roll-label" data-input="forca">Força</label><input id="forca" type="number"></div>
          <div class="field"><label class="roll-label" data-input="agilidade">Agilidade</label><input id="agilidade" type="number"></div>
          <div class="field"><label class="roll-label" data-input="intelecto">Intelecto</label><input id="intelecto" type="number"></div>
          <div class="field"><label class="roll-label" data-input="presenca">Presença</label><input id="presenca" type="number"></div>
          <div class="field"><label class="roll-label" data-input="vigor">Vigor</label><input id="vigor" type="number"></div>

        </div>
      </div>

      <!-- STATUS -->
      <div class="panel">
        <h2>STATUS</h2>

        <div class="status-block">
          <label>VIDA</label>
          <div class="status-inputs">
            <input id="vida-atual" type="number">
            <span>/</span>
            <input id="vida-max" type="number">
          </div>
          <div class="bar"><div id="vida"></div></div>
        </div>

        <div class="status-block">
          <label>SANIDADE</label>
          <div class="status-inputs">
            <input id="sanidade-atual" type="number">
            <span>/</span>
            <input id="sanidade-max" type="number">
          </div>
          <div class="bar"><div id="sanidade"></div></div>
        </div>

        <div class="status-block">
          <label>ENERGIA</label>
          <div class="status-inputs">
            <input id="energia-atual" type="number">
            <span>/</span>
            <input id="energia-max" type="number">
          </div>
          <div class="bar"><div id="energia"></div></div>
        </div>

        <div class="grid-3">
          <div class="field"><label>Defesa</label><input id="defesa"></div>
          <div class="field"><label>Iniciativa</label><input id="iniciativa"></div>
          <div class="field"><label>Desloc.</label><input id="deslocamento"></div>
        </div>

      </div>

    </section>

    <!-- ===== DIREITA ===== -->
    <section class="col">

      <!-- COMBATE -->
      <div class="panel">
        <h2>COMBATE</h2>
        <div class="grid-2">

          <div class="field"><label class="roll-label" data-input="luta">Luta (Força)</label><input id="luta"></div>
          <div class="field"><label class="roll-label" data-input="pontaria">Pontaria (Agilidade)</label><input id="pontaria"></div>
          <div class="field"><label class="roll-label" data-input="tatica">Tática (Intelecto)</label><input id="tatica"></div>
          <div class="field"><label>Dano</label><input id="dano-corpo"></div>

        </div>
      </div>

      <!-- PERÍCIAS -->
      <div class="panel">
        <h2>PERÍCIAS</h2>
        <div class="grid-2">

          <div class="field"><label class="roll-label" data-input="investigacao">Investigação (Intelecto)</label><input id="investigacao"></div>
          <div class="field"><label class="roll-label" data-input="percepcao">Percepção (Vigor)</label><input id="percepcao"></div>
          <div class="field"><label class="roll-label" data-input="furtividade">Furtividade (Agilidade)</label><input id="furtividade"></div>
          <div class="field"><label class="roll-label" data-input="atletismo">Atletismo (Força)</label><input id="atletismo"></div>
          <div class="field"><label class="roll-label" data-input="tecnologia">Tecnologia (Intelecto)</label><input id="tecnologia"></div>
          <div class="field"><label class="roll-label" data-input="medicina">Medicina (Intelecto)</label><input id="medicina"></div>
          <div class="field"><label class="roll-label" data-input="intimidacao">Intimidação (Presença)</label><input id="intimidacao"></div>
          <div class="field"><label class="roll-label" data-input="persuasao">Persuasão (Presença)</label><input id="persuasao"></div>

        </div>
      </div>

      <!-- EQUIPAMENTO -->
      <div class="panel">
        <h2>EQUIPAMENTO</h2>
        <div class="grid-2">
          <div class="field"><label>Armadura</label><input id="armadura-nome"></div>
          <div class="field"><label>Proteção</label><input id="armadura-def"></div>
          <div class="field"><label>Penalidade</label><input id="armadura-pen"></div>
          <div class="field"><label>Durabilidade</label><input id="armadura-dur"></div>
        </div>

        <textarea id="armadura-notas"></textarea>
      </div>

      <!-- ARMAS -->
      <div class="panel">
        <h2>ARMAS</h2>
        <div class="grid-2">
          <div class="field"><label>Arma</label><input id="arma1"></div>
          <div class="field"><label>Dano</label><input id="arma1-dano"></div>
          <div class="field"><label>Crítico</label><input id="arma1-crit"></div>
          <div class="field"><label>Munição</label><input id="arma1-mun"></div>
        </div>

        <textarea id="armas-notas"></textarea>
      </div>

    </section>

  </main>

</div>

<!-- DADO -->
<div id="dice-overlay">
  <div style="display:flex; flex-direction:column; align-items:center; gap:16px;">
    <div id="dice-sprite"></div>
    <div id="dice-text" class="dice-text"></div>
  </div>
</div>

<!-- PLAYER -->
<script>
  localStorage.setItem("playerId", "p5");
</script>

<!-- BOTÃO -->
<a href="../arvore5.html" class="skill-btn">⛧ Habilidades ⛧</a>

<!-- SCRIPT CORRETO -->
<script type="module" src="../main.js"></script>

</body>
</html>
